<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KidoPiano</title>
    <style>
        body { 
            background: #111; color: #fff; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: flex-start; 
            justify-content: center; height: 100vh; overflow: hidden;
            touch-action: none; /* Disables browser-level gestures */
        }
        #container { margin-top: 20px; width: 95vw; height: 60vh; }
        #piano-scroll { 
            display: flex; overflow-x: auto; height: 100%;
            border: 4px solid #444; border-radius: 10px; background: #000;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain; /* Prevents pull-to-refresh */
            touch-action: pan-x; /* Explicitly allows horizontal scrolling */
        }
        button { 
            flex-shrink: 0; border: 1px solid #000; cursor: pointer; 
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 10px; font-weight: bold; font-size: 12px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .white { background: #fff; color: #000; width: 80px; height: 100%; }
        .black { background: #000; color: #fff; width: 50px; height: 70%; margin-left: -25px; margin-right: -25px; z-index: 2; }
        button:active { background: #ffcc00; }
        #landscape-msg { display: none; color: yellow; margin-top: 10px; }
        @media screen and (orientation:portrait) { #landscape-msg { display: block; } }
    </style>
</head>
<body>

    <div id="container">
        <div id="piano-scroll"></div>
    </div>
    <div id="landscape-msg">Please rotate your phone to landscape mode!</div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const container = document.getElementById('piano-scroll');
        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        function playTone(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        for (let i = 0; i < 88; i++) {
            const freq = 440 * Math.pow(2, (i - 49) / 12);
            const btn = document.createElement('button');
            const noteIndex = i % 12;
            const isBlack = [1, 3, 6, 8, 10].includes(noteIndex);
            
            btn.className = isBlack ? 'black' : 'white';
            if (!isBlack) {
                btn.innerText = noteNames[noteIndex];
            }
            
            // Using pointerdown instead of click for faster, multi-touch response
            btn.addEventListener('pointerdown', (e) => {
                e.target.setPointerCapture(e.pointerId);
                audioCtx.resume(); 
                playTone(freq);
                btn.style.background = '#ffcc00';
            });

            btn.addEventListener('pointerup', () => {
                btn.style.background = '';
            });

            container.appendChild(btn);
        }
    </script>
</body>
</html>
